<script>
  /* Preventing a default form submission (which reloads the page) is commonly achieved using JavaScript to 
     stop the event, allowing for custom validation or AJAX submissions instead. 
     The most standard and recommended method is using event.preventDefault(). 
  */
  var studentList = [];
  var apiUrl = 'https://localhost:7222/api/Student';

  getStudents();
  async function getStudents() {
    const response = await fetch(apiUrl, {
      method: 'GET',
      headers: {
        'accept': '*/*'
      }
    });
    if (response.ok) {
      studentList = await response.json();
      console.log("Student retrieved:", studentList);
      displayStudents(studentList)
    }
    else {
      console.error("Failed to fetch students:", response.status);
    }
  }
  async function updateStudent(event) {
    event.preventDefault(); // Prevent page reload

    // 1. Collect the updated data from the form
    var id = document.getElementById("id").value;
    var firstName = document.getElementById("firstName").value;
    var lastName = document.getElementById("lastName").value;
    var dob = document.getElementById("dob").value;
    var age = document.getElementById("age").value;
    var email = document.getElementById("email").value;
    var phone = document.getElementById("phone").value;
    var address = document.getElementById("address").value;
    var city = document.getElementById("city").value;
    var state = document.getElementById("state").value;
    var course = document.getElementById("course").value;
    var admissionDate = document.getElementById("admissionDate").value;

    var gender = "";
    var genderRes = document.getElementsByName("gender");
    for (var i = 0; i < genderRes.length; i++) {
      if (genderRes[i].checked) {
        gender = genderRes[i].value;
        break;
      }
    }

    // 2. Create the data object
    var studentData = {
      StudentID: parseInt(id),
      FirstName: firstName,
      LastName: lastName,
      Gender: gender,
      Dateofbirth: dob,
      Age: parseInt(age),
      Email: email,
      Phone: phone,
      Address: address,
      City: city,
      State: state,
      Course: course,
      AdmiDate: admissionDate
    };

    try {
      // 3. Send the PUT request to the server
      // Note: Most APIs expect the ID in the URL for PUT requests
      const response = await fetch(`${apiUrl}/${id}`, { // Notice the /${id} at the end
        method: 'PUT',
        headers: {
          'accept': '*/*',
          'Content-Type': 'application/json'
        },
        body: JSON.stringify(studentData)
      });

      if (response.ok) {
        alert("Student Updated Successfully!");

        // 4. Reset UI: Switch buttons back and clear form
        document.getElementById("submitBtn").style.display = "inline-block";
        document.getElementById("updateBtn").style.display = "none";
        document.getElementById("id").readOnly = false;

        // Reset the form values
        event.target.closest('form').reset();

        // 5. Refresh the Table Data
        getStudents();
      } else {
        alert("Update failed. Server status: " + response.status);
      }
    } catch (error) {
      console.error("Error updating student:", error);
      alert("An error occurred while updating.");
    }
  }


  function update(studentID) {
    const student = studentList.find(x => {
      // This will log every comparison until it finds a match
      console.log(`Comparing ${x.studentID} == ${studentID}`);
      return x.studentID == studentID;
    });
    document.getElementById("id").value = student.studentID;
    document.getElementById("firstName").value = student.firstName;
    document.getElementById("lastName").value = student.lastName;
    document.getElementById("dob").value = student.dateofbirth;
    //document.getElementById("gender").value = student.gender;
    document.getElementById("age").value = student.age;
    document.getElementById("email").value = student.email;
    document.getElementById("phone").value = student.phone;
    document.getElementById("address").value = student.address;
    document.getElementById("city").value = student.city;
    document.getElementById("state").value = student.state;
    document.getElementById("course").value = student.course;
    document.getElementById("admissionDate").value = student.admiDate;

    // Find all radio buttons with name="gender"
    var genderRadios = document.getElementsByName("gender");
    for (let i = 0; i < genderRadios.length; i++) {
      if (genderRadios[i].value === student.gender) {
        genderRadios[i].checked = true;
        break;
      }
    }
    document.getElementById("submitBtn").style.display = "none";    // Hide Submit
    document.getElementById("updateBtn").style.display = "inline-block"; // Show Update

    // Recommended: Prevent user from changing the ID during an update
    document.getElementById("id").readOnly = true;

    console.log("Form populated for editing:", JSON.stringify(student));
    // console.log(JSON.stringify(student));

  }

  async function handleDelete(studentID) {
    if (confirm("Are you sure you want to delete this student?")) {

      const response = await fetch(`${apiUrl}/${studentID}`, {
        method: 'DELETE',
        headers: {
          'accept': '*/*'
        }
      });

      if (response.ok) {
        alert("Student deleted successfully!");
        getStudents(); // Refresh the table
      } else {
        alert("Failed to delete. Server returned: " + response.status);
      }
    }
  }
  // --- SEARCH LOGIC START ---
    document.getElementById('btnSearch').addEventListener('click', function() {
        const searchTerm = document.getElementById('studentSearch').value.trim().toLowerCase();
        
        if (searchTerm === "") {
            displayStudents(studentList); // Reset to full list if empty
            return;
        }

        const firstLetter = searchTerm.charAt(0);
        
        // Filter the existing list
        const filteredData = studentList.filter(student => 
            student.firstName.toLowerCase().startsWith(firstLetter)
            );

        displayStudents(filteredData);
    });

    // Optional: Real-time search as you type
    document.getElementById('studentSearch').addEventListener('input', function() {
        const char = this.value.trim().toLowerCase();
        if(char === "") {
            displayStudents(studentList);
        } else {
            const filtered = studentList.filter(s => s.firstName.toLowerCase().startsWith(char.charAt(0)));
            displayStudents(filtered);
        }
    });
    // --- SEARCH LOGIC END ---


  function displayStudents(students) {
    const tableBody = document.getElementById('studentTableBody');
    tableBody.innerHTML = ''; // Clear existing data

    students.forEach(student => {
      const row = `
            <tr>
                <td>${student.studentID}</td>
                <td>${student.firstName}</td>
                <td>${student.lastName}</td>
                <td>${student.dateofbirth}</td>
                <td>${student.gender}</td>
                <td>${student.age}</td>
                <td>${student.email}</td>
                <td>${student.phone}</td>
                <td>${student.address}</td>
                <td>${student.city}</td>
                <td>${student.state}</td>
                <td>${student.course}</td>
                <td>${student.admiDate}</td>
                <td>
                  <button type="button" onclick="update('${student.studentID}')" class="btn btn-primary">Edit</button>
                  <button type="button" onclick="handleDelete('${student.studentID}')" class="btn btn-danger">Delete</button>
                </td>
                  
                
            </tr>
        `;
      tableBody.innerHTML += row;
    });
  }
  async function createStudent(event) {
    event.preventDefault();

    var id = document.getElementById("id").value;
    var firstName = document.getElementById("firstName").value;
    var lastName = document.getElementById("lastName").value;
    var dob = document.getElementById("dob").value;
    var age = document.getElementById("age").value;
    var email = document.getElementById("email").value;
    var phone = document.getElementById("phone").value;
    var address = document.getElementById("address").value;
    var city = document.getElementById("city").value;
    var state = document.getElementById("state").value;
    var course = document.getElementById("course").value;
    var admissionDate = document.getElementById("admissionDate").value;

    var gender = "";
    var genderRes = document.getElementsByName("gender");
    for (var i = 0; i < genderRes.length; i++) {
      if (genderRes[i].checked) {
        gender = genderRes[i].value;
        break;
      }
    }

    // Validation
    if (id == "") { document.getElementById("error").innerHTML = "please Enter Student id"; return false; }
    if (firstName == "") { document.getElementById("error").innerHTML = "please Enter first name"; return false; }
    if (lastName == "") { document.getElementById("error").innerHTML = "please Enter Last name"; return false; }
    if (dob == "") { document.getElementById("error").innerHTML = "please Enter DOB"; return false; }
    if (gender == "") { document.getElementById("error").innerHTML = "please select gender"; return false; }
    if (age == "") { document.getElementById("error").innerHTML = "please Enter Age"; return false; }
    if (email == "") { document.getElementById("error").innerHTML = "please Enter Email"; return false; }

    document.getElementById("error").innerHTML = "";
    document.getElementById("dateError").innerHTML = "";

    var studentData = {
      StudentID: parseInt(id),
      FirstName: firstName,
      LastName: lastName,
      Gender: gender,
      Dateofbirth: dob,
      Age: parseInt(age),
      Email: email,
      Phone: phone,
      Address: address,
      City: city,
      State: state,
      Course: course,
      AdmiDate: admissionDate
    }

    // Determine if we should POST or PUT
    const isExisting = studentList.some(x => x.studentID == studentData.StudentID);
    const methodType = isExisting ? 'PUT' : 'POST';

    const response = await fetch(apiUrl, {
      method: methodType,
      headers: {
        'accept': '*/*',
        'Content-Type': 'application/json'
      },
      body: JSON.stringify(studentData)
    });

    if (response.ok) {
      alert(isExisting ? "Updated Successfully!" : "Created Successfully!");
      // Reset form and refresh table
      event.target.reset();
      getStudents();
    }
    else {
      alert("Server Error");
      console.log("Server Response Error:", response.status);
    }
  }


</script>
