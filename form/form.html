<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link href="./bootstrap-5.3.0/css/bootstrap.min.css" rel="stylesheet" />
    <script src="./bootstrap-5.3.0/js/bootstrap.bundle.min.js"></script>

    <title>Student Form</title>

    <style>
      .form-box {
        border: 2px solid black;
        padding: 25px;
        border-radius: 10px;
        width: 400px;
        margin: auto;
        background-color: #f9f9f9;
      }
    </style>
  </head>

  <body>
    <div class="container mt-4">
      <form class="form-box" onsubmit="myfunction(event)" action="#">
        <h3 class="text-center">Student Form</h3>

        <label>Id:</label>
        <input type="number" id="id" class="form-control" /><br />
        <span id="error" style="color: red"></span><br />

        <label>First Name:</label>
        <input type="text" id="firstName" class="form-control" /><br />

        <label>Last Name:</label>
        <input type="text" id="lastName" class="form-control" /><br />

        <label>Date of Birth:</label>
        <input type="date" id="dob" class="form-control" /><br />

        <label>Gender:</label><br />

        <input type="radio" name="gender" value="Male" /> Male
        <input type="radio" name="gender" value="Female" /> Female
        <input type="radio" name="gender" value="Other" /> Other <br /><br />

        <label>Age:</label>
        <input type="number" id="age" class="form-control" /><br />

        <label>Email:</label>
        <input type="email" id="email" class="form-control" /><br />

        <label>Phone:</label>
        <input type="number" id="phone" class="form-control" /><br />

        <label>Address:</label>
        <input type="text" id="address" class="form-control" /><br />

        <label>Select City:</label>
        <select id="city">
          <option value="">-- Select City --</option>
          <option value="Delhi">Delhi</option>
          <option value="Noida">Noida</option>
          <option value="Ghaziabad">Ghaziabad</option>
        </select>
        <br />
        <label>Select State:</label>
        <select id="state">
          <option value="">-- Select State --</option>
          <option value="Delhi">Delhi</option>
          <option value="UP">Uttar Pradesh</option>
          <option value="Maharashtra">Maharashtra</option>
        </select>
        <br />
        <label>Select Course:</label>
        <select id="course">
          <option value="">-- Select Course --</option>
          <option value="BCA">BCA</option>
          <option value="MCA">MCA</option>
          <option value="IIT">IIT</option>
        </select>
        <br />

        <label>Admission Date:</label>
        <input type="date" id="admissionDate" class="form-control" /><br />
        <span id="dateError" style="color: red"></span>

        <button type="submit" class="btn btn-primary w-100">Submit</button>
      </form>
    </div>
  </body>
