<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Employee Form</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
  </head>

  <body class="bg-light">
    <div class="container py-5">
      <div class="card shadow-sm mb-5">
        <div class="card-body">
          <h3 class="text-center mb-4">Employee Details</h3>

          <form class="row g-3 needs-validation" novalidate>
            <div class="col-md-6" hidden="hidden">
              <label class="form-label">Id</label>
              <input type="text" class="form-control" id="id" required />
            </div>
            <div class="col-md-6">
              <label class="form-label">First Name</label>
              <input type="text" class="form-control" id="f_name" required />
            </div>
            <div class="col-md-6">
              <label class="form-label">Last Name</label>
              <input type="text" class="form-control" id="l_name" required />
            </div>
            <div class="col-md-6">
              <label class="form-label">Email</label>
              <input type="email" class="form-control" id="email" required />
            </div>
            <div class="col-md-6">
              <label class="form-label">Phone</label>
              <input type="text" class="form-control" id="phone" required />
            </div>
            <div class="col-12 text-center">
              <button type="button" id="submitBtn" onclick="createEmp(event)" class="btn btn-primary">Submit</button>
              <button type="button" id="updateBtn" onclick="updateEmp(event)" class="btn btn-success" style="display: none;">Update</button>
            </div>
          </form>
        </div>
      </div>

      <div class="card shadow-sm">
        <div class="card-body">
          <div class="row align-items-center mb-3">
            <div class="col-md-6">
              <h4 class="m-0">Employee List</h4>
               <small class="text-muted">
                Total Employees: <span id="employeeCount">0</span>
             </small>
            </div>
            <div class="col-md-6">
              <div class="input-group">
                <input 
                  type="search" 
                  id="employeeSearch" 
                  class="form-control" 
                  placeholder="Type a character..." 
                  oninput="searchEmpDeBound()"
                />
                <button class="btn btn-primary" type="button" id="btnSearch" onclick="searchEmpAPI()">Search</button>
              </div>
            </div>
          </div>

    id="saveAllBtn"
    style="display:none"
    onclick="saveAllEmployees()">
    Save All
</button> -->

<button
    class="btn btn-warning"
    onclick="enableBulkEdit()">
    Bulk Edit
</button>

<button
    id="saveAllBtn"
    class="btn btn-success"
    style="display:none"
    onclick="saveAllEmployees()">
    Save All
</button>

<button
    id="cancelBulkEditBtn"
    class="btn btn-secondary"
    style="display:none"
    onclick="cancelBulkEdit()">
    Cancel
</button>

          <div class="table-responsive">
            <table class="table table-bordered table-striped table-hover align-middle text-center">
              <thead class="table-dark">
                <tr>
                  <th>Id</th>
                  <th>First Name</th>
                  <th>Last Name</th>
                  <th>Email</th>
                  <th>Phone</th>
                  <th>Actions</th>
                </tr>
              </thead>
              <tbody id="EmployeeTableBody"></tbody>
            </table>
          </div>
        </div>
      </div>
    </div>

    <script src="./script.js"></script>
  </body>
</html>
