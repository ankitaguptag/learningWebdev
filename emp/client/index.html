<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Employee Form</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
  </head>

  <body class="bg-light">
    <div class="container py-5">
      <!-- FORM CARD -->
      <div class="card shadow-sm mb-5">
        <div class="card-body">
          <h3 class="text-center mb-4">Employee Details</h3>

          <form class="row g-3 needs-validation" novalidate>
            <div class="col-md-6">
              <label class="form-label">First Name</label>
              <input type="text" class="form-control" id="f_name" required />
            </div>

            <div class="col-md-6">
              <label class="form-label">Last Name</label>
              <input type="text" class="form-control" id="l_name" required />
            </div>

            <div class="col-md-6">
              <label class="form-label">Email</label>
              <input type="email" class="form-control" id="email" required />
            </div>

            <div class="col-md-6">
              <label class="form-label">Phone</label>
              <input type="text" class="form-control" id="phone" required />
            </div>

            <div class="col-12 text-center">
              <button class="btn btn-primary px-4" onclick="createEmp(event)">
                Submit
              </button>
            </div>
          </form>
        </div>
      </div>

      <!-- TABLE CARD -->
      <div class="card shadow-sm">
        <div class="card-body">
          <h4 class="mb-3">Employee List</h4>

          <div class="table-responsive">
            <table
              class="table table-bordered table-striped table-hover align-middle text-center"
            >
              <thead class="table-dark">
                <tr>
                  <th>Id</th>
                  <th>First Name</th>
                  <th>Last Name</th>
                  <th>Email</th>
                  <th>Phone</th>
                  <th>Actions</th>
                </tr>
              </thead>

              <tbody id="EmployeeTableBody"></tbody>
            </table>
          </div>
        </div>
      </div>
    </div>

    <script src="./script.js"></script>
  </body>
</html>
